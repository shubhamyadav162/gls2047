<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Contact Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <style>
    body { max-width:600px; margin:40px auto; font-family:Arial }
    button { margin-top:10px }
  </style>
</head>
<body>

<h3>Contact Form</h3>

<form id="contactForm" name="contactForm" method="POST" enctype="multipart/form-data">
  <input class="form-control" name="name" placeholder="Name" required><br>
  <input class="form-control" name="company" placeholder="Company" required><br>
  <input class="form-control" name="designation" placeholder="Designation" required><br>
  <input class="form-control" name="email" type="email" placeholder="Email" required><br>
  <input class="form-control" name="mobile" placeholder="Mobile" required><br>

  <select class="form-control" name="subject" required>
    <option value="">--Select Subject--</option>
    <option value="Call me back">Call me back</option>
    <option value="Contact Enquiry">Contact Enquiry</option>
    <option value="Delegate Registration">Delegate Registration</option>
    <option value="Exhibitor Registration">Exhibitor Registration</option>
    <option value="Sponsorship Registration">Sponsorship Registration</option>
    <option value="Other">Other</option>
  </select><br>

  <textarea class="form-control" name="message" rows="4" placeholder="Message" required></textarea><br>

  <input type="file" id="attachment" accept=".pdf,.doc,.docx,.ppt,.pptx,.png,.jpg"><br>

  <button class="btn btn-primary" type="submit" name="submit">Submit</button>
</form>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwLnQOTtFDUqdNuOWejZcalw9dicMTPgASOnR0hchTWZ_QfhMwkuQqHYCg-iTjPhhZE/exec";

document.getElementById("contactForm").addEventListener("submit", async function (e) {
  e.preventDefault();

  const form = e.target;
  const btn = form.querySelector("button");
  btn.disabled = true;
  btn.textContent = "Sending...";

  const data = new FormData(form);

  /* ========= BASE64 FILE HANDLING ========= */
  const fileInput = document.getElementById("attachment");
  if (fileInput.files.length > 0) {
    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = async () => {
      data.append("file_base64", reader.result);
      data.append("file_name", file.name);
      data.append("file_type", file.type);
      await sendData(data);
    };
    reader.readAsDataURL(file);
  } else {
    await sendData(data);
  }

  async function sendData(data) {
    try {
      const res = await fetch(SCRIPT_URL, {
        method: "POST",
        body: data
      });

      const result = await res.json();

      if (result.status === "success") {
        alert("✅ Message sent successfully");
        form.reset();
      } else {
        alert("❌ Error: " + result.message);
      }
    } catch (err) {
      alert("⚠️ Network error");
      console.error(err);
    } finally {
      btn.disabled = false;
      btn.textContent = "Submit";
    }
  }
});
</script>

</body>
</html>
